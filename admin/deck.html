<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esphera — Presentación</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#FFFBF7;--dark:#0D1526;--dark2:#111B30;--accent:#F97316;--accent-hover:#EA580C;
      --accent-light:#FDBA74;--accent-pale:#FFF0E6;--green:#10B981;--red:#EF4444;
      --border:#EDE5DC;--muted:#64748B;--text:#0F172A;--text2:#334155;
    }
    html{scroll-behavior:smooth;scroll-snap-type:y mandatory}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
    h1,h2,h3,h4,.tag,.nav-logo{font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:-0.03em}

    /* NAV */
    .nav{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:12px;padding:8px 16px;background:rgba(255,251,247,0.85);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:100px;box-shadow:0 4px 24px rgba(0,0,0,0.06);transition:all 0.3s}
    .nav.on-dark{background:rgba(13,21,38,0.8);border-color:rgba(255,255,255,0.08)}
    .nav-logo{font-size:14px;font-weight:800;color:var(--accent)}
    .nav-dots{display:flex;gap:3px}
    .nav-dot{width:6px;height:6px;border-radius:50%;background:var(--border);cursor:pointer;transition:all 0.3s}
    .nav-dot.active{width:20px;border-radius:3px;background:var(--accent)}
    .nav-label{font-size:11px;color:var(--muted);font-weight:600;min-width:32px;text-align:center}
    .nav-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:14px}
    .nav-btn:hover{border-color:var(--accent);color:var(--accent)}
    .nav.on-dark .nav-dot{background:rgba(255,255,255,0.15)}
    .nav.on-dark .nav-label{color:rgba(255,255,255,0.4)}
    .nav.on-dark .nav-btn{border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.4)}

    /* SLIDES */
    .slide{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 48px 48px;scroll-snap-align:start;position:relative;overflow:hidden}
    .slide-inner{width:100%;max-width:1100px;position:relative;z-index:2}
    .slide-dark{background:var(--dark);color:#fff}
    .slide-dark h1,.slide-dark h2,.slide-dark h3{color:#fff}
    .slide-dark .lead{color:rgba(255,255,255,0.55)}
    .slide-cream{background:var(--bg)}

    /* BG photo overlay */
    .slide-photo{position:absolute;inset:0;z-index:0}
    .slide-photo img{width:100%;height:100%;object-fit:cover}
    .slide-photo::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,21,38,0.88) 0%,rgba(13,21,38,0.95) 100%)}

    /* REVEAL */
    .reveal{opacity:0;transform:translateY(20px);transition:all 0.6s cubic-bezier(0.16,1,0.3,1)}
    .reveal.visible{opacity:1;transform:translateY(0)}
    .d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}.d4{transition-delay:.4s}.d5{transition-delay:.5s}

    /* TYPE */
    .tag{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);padding:5px 12px;background:var(--accent-pale);border-radius:100px;margin-bottom:16px}
    .tag-dark{background:rgba(249,115,22,0.12);color:var(--accent-light)}
    h1{font-size:clamp(2.8rem,5vw,4.2rem);font-weight:900;line-height:1.05;margin-bottom:16px}
    h2{font-size:clamp(2rem,3.5vw,3rem);font-weight:800;line-height:1.1;margin-bottom:16px}
    .accent{color:var(--accent)}
    .lead{font-size:1.15rem;color:var(--muted);line-height:1.7;max-width:580px}
    .lead-light{color:rgba(255,255,255,0.55)}

    /* BADGE empresa */
    .hero-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.2);border-radius:100px;font-size:13px;color:var(--accent-light);font-weight:600;margin-bottom:20px}

    /* PAIN CARDS */
    .pain-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:40px}
    .pain-card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:32px 28px;transition:all 0.3s}
    .pain-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.06)}
    .pain-icon{width:48px;height:48px;border-radius:14px;background:rgba(239,68,68,0.06);display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:22px}
    .pain-card h3{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--text)}
    .pain-card p{font-size:14px;color:var(--muted);line-height:1.6}

    /* FLOW — 3 columns */
    .flow{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:16px;align-items:start;margin-top:40px}
    .flow-card{background:var(--dark);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:28px 24px;color:#fff}
    .flow-step{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:0.1em;margin-bottom:12px}
    .flow-card h3{font-size:16px;font-weight:700;margin-bottom:8px}
    .flow-card p{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.6}
    .flow-arrow{display:flex;align-items:center;color:var(--accent);font-size:20px;padding-top:40px}

    /* PRODUCT MOCKUP — real style */
    .mock-window{background:var(--dark);border-radius:16px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.2)}
    .mock-bar{display:flex;gap:6px;padding:10px 14px;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06)}
    .mock-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.1)}
    .mock-body{display:flex;height:340px;overflow:hidden}
    .mock-sidebar{width:48px;background:linear-gradient(180deg,#0D1526,#111B30);border-right:1px solid rgba(255,255,255,0.04);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:10px;flex-shrink:0}
    .mock-logo{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#F97316,#FDBA74);margin-bottom:8px}
    .mock-nav{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,0.04)}
    .mock-nav.active{background:rgba(249,115,22,0.15);border-left:2px solid var(--accent)}
    .mock-content{flex:1;background:var(--bg);padding:16px;overflow:hidden}
    .mock-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .mock-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);background:var(--accent-pale);padding:3px 8px;border-radius:100px}

    /* Metric mini cards */
    .mock-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
    .mock-metric{background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
    .mock-metric-num{font-size:16px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;display:block}
    .mock-metric-label{font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;font-weight:600}

    /* File rows */
    .mock-file{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#fff;border:1px solid var(--border);border-radius:8px;font-size:11px;margin-bottom:4px}
    .mock-file-icon{padding:1px 5px;border-radius:3px;font-size:8px;font-weight:800}
    .mock-file-icon.pdf{background:rgba(239,68,68,0.08);color:#EF4444}
    .mock-file-icon.xml{background:rgba(16,185,129,0.08);color:#10B981}
    .mock-file-name{flex:1;color:var(--text2);font-weight:500}

    /* Extract rows */
    .mock-extract-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:10px}
    .mock-label{color:var(--muted)}
    .mock-value{color:var(--text);font-weight:600}

    /* Chat mockup */
    .chat-mock{background:#0F172A;border-radius:20px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.3);max-width:380px}
    .chat-header{display:flex;align-items:center;gap:10px;padding:14px 18px;background:linear-gradient(135deg,#0F172A,#1E293B)}
    .chat-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;object-position:center 20%;border:2px solid rgba(249,115,22,0.4)}
    .chat-name{font-size:13px;font-weight:700;color:#fff}
    .chat-role{font-size:10px;color:rgba(255,255,255,0.4)}
    .chat-online{width:8px;height:8px;border-radius:50%;background:var(--green);margin-left:auto}
    .chat-body{padding:16px;background:#f8fafc;min-height:260px;display:flex;flex-direction:column;gap:10px}
    .chat-msg{display:flex;gap:8px;align-items:flex-start}
    .chat-msg-avatar{width:22px;height:22px;border-radius:50%;object-fit:cover;object-position:center 20%;border:1px solid var(--border);flex-shrink:0;margin-top:2px}
    .chat-bubble{background:#fff;border:1px solid var(--border);border-radius:14px 14px 14px 4px;padding:10px 14px;font-size:12px;color:var(--text2);line-height:1.5;max-width:270px}
    .chat-bubble strong{color:var(--text)}
    .chat-bubble-user{background:var(--accent);color:#fff;border-radius:14px 14px 4px 14px;padding:10px 14px;font-size:12px;font-weight:500;margin-left:auto}
    .chat-chips{display:flex;flex-wrap:wrap;gap:5px;padding-left:30px}
    .chat-chip{font-size:10px;font-weight:600;color:var(--accent);background:#fff;border:1px solid var(--accent-light);padding:4px 10px;border-radius:100px}

    /* Chat animation */
    @keyframes chat-in{0%,8%{opacity:0;transform:translateY(8px)}14%,78%{opacity:1;transform:translateY(0)}86%,100%{opacity:0;transform:translateY(-4px)}}
    .anim-chat{opacity:0;animation:chat-in 12s ease-in-out infinite}

    /* IMPACT */
    .impact-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:40px}
    .impact-card{text-align:center;padding:32px 20px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:20px}
    .impact-num{font-size:clamp(2.5rem,4vw,3.5rem);font-weight:900;color:#fff;font-family:'Plus Jakarta Sans',sans-serif}
    .impact-unit{font-size:0.5em;color:var(--accent-light);margin-left:2px}
    .impact-label{font-size:13px;color:rgba(255,255,255,0.45);margin-top:8px;line-height:1.4}

    /* TESTIMONIAL */
    .testi{display:flex;align-items:center;gap:20px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:24px 28px;margin-top:40px;max-width:700px;margin-left:auto;margin-right:auto}
    .testi-avatar{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid rgba(249,115,22,0.3);flex-shrink:0}
    .testi-quote{font-size:14px;color:rgba(255,255,255,0.7);line-height:1.6;font-style:italic;flex:1}
    .testi-meta{margin-top:8px;font-size:12px}
    .testi-name{color:#fff;font-weight:700}
    .testi-role{color:rgba(255,255,255,0.4)}

    /* INTEGRATION HUB */
    .hub{display:flex;align-items:center;justify-content:center;gap:40px;margin-top:40px;flex-wrap:wrap}
    .hub-center{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-light));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 8px 32px rgba(249,115,22,0.3)}
    .hub-spoke{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:12px;color:var(--text2);font-weight:600}
    .hub-spoke-dot{width:40px;height:40px;border-radius:12px;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px}

    /* DIFF CARDS */
    .diff-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:40px}
    .diff-card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:28px 24px}
    .diff-card h3{font-size:15px;font-weight:700;margin-bottom:6px}
    .diff-card p{font-size:13px;color:var(--muted);line-height:1.6}
    .diff-icon{font-size:24px;margin-bottom:12px}

    /* CTA */
    .cta-box{text-align:center;position:relative;z-index:2}
    .cta-btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;font-size:16px;font-weight:700;padding:16px 40px;border-radius:100px;text-decoration:none;box-shadow:0 8px 32px rgba(249,115,22,0.3);transition:all 0.2s;font-family:'Plus Jakarta Sans',sans-serif}
    .cta-btn:hover{background:var(--accent-hover);transform:translateY(-2px);box-shadow:0 12px 40px rgba(249,115,22,0.4)}
    .cta-trust{display:flex;justify-content:center;gap:24px;margin-top:24px;font-size:13px;color:rgba(255,255,255,0.5);font-weight:500}

    /* SPLIT layout */
    .split{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}

    /* Animated bars */
    @keyframes bar-grow{0%,10%{transform:scaleY(0);opacity:0}20%,80%{transform:scaleY(1);opacity:1}90%,100%{transform:scaleY(0);opacity:0}}
    .anim-bar{transform-origin:bottom;animation:bar-grow 8s ease-in-out infinite}

    /* Animated slide-up */
    @keyframes slide-up{0%,10%{opacity:0;transform:translateY(10px)}20%,80%{opacity:1;transform:translateY(0)}90%,100%{opacity:0;transform:translateY(-4px)}}
    .anim-file{opacity:0;animation:slide-up 8s ease-in-out infinite}
    .anim-row{opacity:0;animation:slide-up 8s ease-in-out infinite}

    /* Bar fill */
    @keyframes bar-fill{0%,10%{width:0}60%,80%{width:97%}90%,100%{width:0}}

    /* Logo */
    .logo-big{height:32px;margin-bottom:24px}

    @media(max-width:768px){
      .pain-grid,.impact-grid{grid-template-columns:1fr}
      .flow{grid-template-columns:1fr;gap:12px}
      .flow-arrow{display:none}
      .split{grid-template-columns:1fr;gap:24px}
      .diff-grid{grid-template-columns:1fr}
      .slide{padding:60px 24px 32px}
    }
  </style>
</head>
<body>
  <!-- NAV -->
  <div class="nav" id="nav">
    <span class="nav-logo">Esphera</span>
    <div class="nav-dots" id="navDots"></div>
    <span class="nav-label" id="slideLabel">1/10</span>
    <button class="nav-btn" id="prevBtn">‹</button>
    <button class="nav-btn" id="nextBtn">›</button>
  </div>

  <div id="deck"></div>

  <script>
    const params = new URLSearchParams(location.search);
    let tipo = params.get('tipo') || 'empresa';
    const empresa = params.get('empresa') || '';
    const contacto = params.get('contacto') || '';
    const isG = tipo === 'gestoria';
    const chk = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    // Content config
    const c = {
      heroTitle: isG
        ? 'Gestiona más clientes <span class="accent">sin ampliar equipo</span>'
        : 'Tu contabilidad, <span class="accent">en piloto automático</span>',
      heroLead: isG
        ? 'Esphera automatiza la lectura, clasificación y contabilización de las facturas de todos tus clientes. Tú te centras en asesorar.'
        : 'Esphera lee tus facturas, extrae los datos y genera los asientos contables automáticamente. Tú decides, la IA ejecuta.',
      problemTitle: isG
        ? '¿Te suena esto?'
        : 'Tu equipo financiero tiene un <span class="accent">problema de escala</span>',
      problems: isG ? [
        {icon:'📈', title:'Más clientes, mismo equipo', desc:'Cada nuevo cliente multiplica el trabajo manual sin aumentar ingresos proporcionalmente.'},
        {icon:'⏰', title:'Picos de trabajo insostenibles', desc:'Los cierres mensuales y trimestrales saturan al equipo durante semanas enteras.'},
        {icon:'😰', title:'Errores por volumen', desc:'Cuantas más facturas, más probabilidad de errores que cuestan tiempo y dinero.'}
      ] : [
        {icon:'📄', title:'Cada factura es diferente', desc:'PDFs, imágenes, XML, Excel. Cada proveedor usa un formato distinto que alguien tiene que interpretar.'},
        {icon:'⌨️', title:'Entrada manual constante', desc:'Tu equipo dedica horas a copiar datos de facturas al ERP. Trabajo repetitivo que no aporta valor.'},
        {icon:'🚨', title:'Errores que cuestan dinero', desc:'Un NIF mal copiado, un importe incorrecto. Pequeños errores con grandes consecuencias.'}
      ],
      impactStats: [
        {n:'10',u:'h/sem',l:'ahorradas por persona'},
        {n:'97',u:'%',l:'de precisión en extracción'},
        {n:'30',u:'seg',l:'por factura procesada'},
        {n:'-85',u:'%',l:'de errores manuales'}
      ],
      erps: isG
        ? ['A3 Innuva','Sage Despachos','Holded','Contaplus']
        : ['SAP Business One','Oracle NetSuite','Sage 200','Dynamics 365'],
      diffs: [
        {icon:'🧠',title:'No es OCR genérico',desc:'Nuestra IA entiende contexto contable, no solo lee texto. Sabe qué es un NIF, un importe y una cuenta.'},
        {icon:'📋',title:'Sin plantillas',desc:'No necesitas configurar plantillas por proveedor. Esphera se adapta a cualquier formato automáticamente.'},
        {icon:'🔗',title:'Se integra con tu ERP',desc:'No sustituye tu software contable, lo complementa. Los asientos van directos a tu sistema.'},
        {icon:'📈',title:'IA que aprende',desc:'Cada corrección que haces, Esphera la recuerda. La precisión mejora con cada factura procesada.'}
      ],
      testiQ: isG
        ? 'Desde que usamos Esphera hemos podido asumir un 40% más de clientes sin contratar a nadie. La IA aprende rápido y cada mes comete menos errores.'
        : 'Hemos reducido el tiempo de contabilización un 80%. Lo que antes nos llevaba 3 días ahora se hace en una mañana.',
      testiN: isG ? 'Ana Roldán' : 'Laura Méndez',
      testiR: isG ? 'Gerente · Gestoría Velázquez' : 'Dir. Financiera · Grupo Atlántica',
      testiImg: isG ? 'Gemini_Generated_Image_qj9fujqj9fujqj9f.png' : 'Gemini_Generated_Image_5dmqwi5dmqwi5dmq.png',
      ctaT: contacto ? `${contacto}, ¿hablamos?` : '¿Empezamos?',
      ctaL: isG
        ? 'Agenda una demo personalizada y te enseñamos cómo Esphera puede ayudar a tu gestoría.'
        : 'Agenda una demo con tus propias facturas y comprueba el resultado en directo.'
    };

    // Build deck HTML
    document.getElementById('deck').innerHTML = `

    <!-- SLIDE 0 — COVER -->
    <section class="slide slide-dark" data-slide="0">
      <div class="slide-photo"><img src="Gemini_Generated_Image_kt0sh5kt0sh5kt0s (1).png" alt=""></div>
      <div class="slide-inner" style="text-align:center">
        <img src="logo-white.svg" alt="Esphera" class="logo-big reveal" style="margin:0 auto 24px">
        ${empresa ? `<div class="hero-badge reveal d1">${chk} Preparado para ${empresa}</div>` : ''}
        <h1 class="reveal ${empresa?'d2':'d1'}">${c.heroTitle}</h1>
        <p class="lead lead-light reveal d3" style="margin:0 auto">${c.heroLead}</p>
      </div>
    </section>

    <!-- SLIDE 1 — PROBLEMA -->
    <section class="slide slide-cream" data-slide="1">
      <div class="slide-inner">
        <span class="tag reveal">El problema</span>
        <h2 class="reveal d1">${c.problemTitle}</h2>
        <div class="pain-grid">
          ${c.problems.map((p,i) => `
          <div class="pain-card reveal d${i+1}">
            <div class="pain-icon">${p.icon}</div>
            <h3>${p.title}</h3>
            <p>${p.desc}</p>
          </div>`).join('')}
        </div>
      </div>
    </section>

    <!-- SLIDE 2 — CÓMO FUNCIONA -->
    <section class="slide slide-cream" data-slide="2">
      <div class="slide-inner">
        <span class="tag reveal">Cómo funciona</span>
        <h2 class="reveal d1">De la factura al asiento. <span class="accent">Así de simple.</span></h2>
        <div class="flow">
          <div class="flow-card reveal d1">
            <div class="flow-step">01</div>
            <h3>Sube tus facturas</h3>
            <p>Arrastra PDFs, imágenes o XML. También desde Google Drive o por email.</p>
            <!-- Mini file list animated -->
            <div style="margin-top:12px">
              <div class="mock-file anim-file" style="animation-delay:0.3s"><span class="mock-file-icon pdf">PDF</span><span class="mock-file-name">factura_repsol.pdf</span><span style="color:var(--green);font-weight:700;font-size:11px">✓</span></div>
              <div class="mock-file anim-file" style="animation-delay:1s"><span class="mock-file-icon xml">XML</span><span class="mock-file-name">factura_euskaltel.xml</span><span style="color:var(--green);font-weight:700;font-size:11px">✓</span></div>
            </div>
          </div>
          <div class="flow-arrow reveal d2">→</div>
          <div class="flow-card reveal d2">

        cur = a;

      if (['ArrowUp','ArrowLeft'].includes(e.key)) { e.preventDefault(); if (cur > 0) slides[cur - 1].scrollIntoView({behavior:'smooth'}); }
    });

    // TRACKING

      const deckId = params.get('empresa') || 'anonymous';

      data.lastVisit = new Date().toISOString();
      data.views.push({ts:new Date().toISOString(), slide:0});
      let lastSlide = 0, lastTime = Date.now();
      const tObs = new IntersectionObserver(es => { es.forEach(e => {
        if (e.isIntersecting) {
          const idx = parseInt(e.target.dataset.slide);
          const now = Date.now();
          if (!data.slideTime[lastSlide]) data.slideTime[lastSlide] = 0;
          data.slideTime[lastSlide] += (now - lastTime) / 1000;
          lastSlide = idx; lastTime = now;
          data.views.push({ts:new Date().toISOString(), slide:idx});
          if (idx > data.maxSlide) data.maxSlide = idx;
          localStorage.setItem(trackKey, JSON.stringify(data));
        }
      }); }, {threshold:0.5});
      document.querySelectorAll('.slide').forEach(s => tObs.observe(s));
      window.addEventListener('beforeunload', () => {
        if (!data.slideTime[lastSlide]) data.slideTime[lastSlide] = 0;
        data.slideTime[lastSlide] += (Date.now() - lastTime) / 1000;
        localStorage.setItem(trackKey, JSON.stringify(data));
        let idx = JSON.parse(localStorage.getItem('esphera_track_index') || '[]');
        if (!idx.includes(trackKey)) idx.push(trackKey);
        localStorage.setItem('esphera_track_index', JSON.stringify(idx));
      });
    })();
