<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esphera — Presentación</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#FFFBF7;--dark:#0C1222;--dark2:#0F172A;--dark3:#1E293B;
      --accent:#F97316;--accent-hover:#EA580C;--accent-light:#FDBA74;--accent-pale:#FED7AA;
      --green:#10B981;--red:#EF4444;--border:#EDE5DC;--muted:#64748B;--text:#0F172A;
    }
    html{scroll-behavior:smooth;scroll-snap-type:y mandatory;overflow-x:hidden}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
    h1,h2,h3,h4,.tag{font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:-0.03em}

    /* NAV */
    .nav{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:12px;padding:8px 16px;background:rgba(255,251,247,0.85);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:100px;box-shadow:0 4px 24px rgba(0,0,0,0.06);transition:all 0.3s}
    .nav.on-dark{background:rgba(12,18,34,0.7);border-color:rgba(255,255,255,0.08)}
    .nav-logo{font-size:14px;font-weight:800;color:var(--accent);font-family:'Plus Jakarta Sans',sans-serif}
    .nav-dots{display:flex;gap:3px}
    .nav-dot{width:6px;height:6px;border-radius:50%;background:var(--border);cursor:pointer;transition:all 0.3s}
    .nav-dot.active{width:20px;border-radius:3px;background:var(--accent)}
    .nav.on-dark .nav-dot{background:rgba(255,255,255,0.15)}
    .nav-label{font-size:11px;color:var(--muted);font-weight:600;min-width:32px;text-align:center}
    .nav.on-dark .nav-label{color:rgba(255,255,255,0.4)}
    .nav-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:14px}
    .nav-btn:hover{border-color:var(--accent);color:var(--accent)}
    .nav.on-dark .nav-btn{border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.4)}

    /* SLIDES */
    .slide{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:64px 48px 40px;scroll-snap-align:start;position:relative;overflow:hidden}
    .slide-inner{width:100%;max-width:1100px;position:relative;z-index:3}
    .slide-dark{background:var(--dark);color:#fff}
    .slide-dark h1,.slide-dark h2,.slide-dark h3{color:#fff}

    /* BG photo */
    .slide-bg{position:absolute;inset:0;z-index:0}
    .slide-bg img{width:100%;height:100%;object-fit:cover;object-position:center 20%}
    .slide-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(12,18,34,0.55) 0%,rgba(12,18,34,0.35) 30%,rgba(12,18,34,0.5) 55%,rgba(12,18,34,0.92) 100%)}

    /* Reveal */
    .reveal{opacity:0;transform:translateY(16px);transition:all 0.5s cubic-bezier(0.16,1,0.3,1)}
    .reveal.visible{opacity:1;transform:translateY(0)}
    .d1{transition-delay:0s}.d2{transition-delay:.08s}.d3{transition-delay:.15s}.d4{transition-delay:.22s}

    /* Tags */
    .tag{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:5px 12px;border-radius:100px;margin-bottom:16px}
    .tag-light{color:var(--accent);background:var(--bg);border:1px solid var(--border)}
    .tag-dark{color:var(--accent-light);background:rgba(249,115,22,0.12)}

    /* Hero title gradient — like the web */
    .hero-title{font-size:clamp(40px,5.5vw,64px);font-weight:800;line-height:1.08;letter-spacing:-0.035em;margin-bottom:16px;background:linear-gradient(160deg,#FFFFFF 30%,#FFE4CC 70%,#FDBA74 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .hero-sub{font-size:16px;color:rgba(255,255,255,0.65);max-width:480px;margin:0 auto 24px;line-height:1.6;text-shadow:0 1px 8px rgba(0,0,0,0.4)}
    .hero-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:100px;font-size:13px;color:rgba(255,255,255,0.7);font-weight:600;margin-bottom:16px}

    /* Floating glass cards */
    .float-cards{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden}
    .fcard{position:absolute;display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);padding:14px 18px;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.15);border:1px solid rgba(255,255,255,0.1);opacity:0.85}
    .fcard-1{top:22%;left:4%;animation:fA 7s ease-in-out infinite}
    .fcard-2{top:18%;right:4%;animation:fB 8s ease-in-out 0.5s infinite}
    .fcard-3{bottom:30%;left:5%;animation:fC 9s ease-in-out 1.5s infinite}
    .fcard-4{bottom:20%;right:4%;animation:fA 7.5s ease-in-out 2.5s infinite}
    @keyframes fA{0%,100%{transform:translateY(0) translateX(0)}50%{transform:translateY(-14px) translateX(4px)}}
    @keyframes fB{0%,100%{transform:translateY(0) translateX(0)}50%{transform:translateY(-10px) translateX(-6px)}}
    @keyframes fC{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    .fcard-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .fcard-icon.green{background:rgba(16,185,129,0.15);color:#6EE7B7}
    .fcard-icon.coral{background:rgba(249,115,22,0.15);color:#FDBA74}
    .fcard-title{font-size:13px;font-weight:600;color:rgba(255,255,255,0.9)}
    .fcard-detail{font-size:12px;color:rgba(255,255,255,0.45)}

    /* Mini product window — glass style */
    .mini-window{max-width:480px;margin:20px auto 0;background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,0.25)}
    .mini-bar{display:flex;gap:6px;padding:10px 14px;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.06)}
    .mini-bar span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.15)}
    .mini-body{display:flex}
    .mini-sidebar{width:48px;padding:12px 0;display:flex;flex-direction:column;align-items:center;gap:8px;border-right:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02)}
    .mini-nav{width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06)}
    .mini-nav.active{background:rgba(249,115,22,0.4)}
    .mini-row{display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.04)}
    .mini-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:800;letter-spacing:0.05em}
    .mini-badge.pdf{background:rgba(239,68,68,0.15);color:#FCA5A5}
    .mini-badge.xml{background:rgba(16,185,129,0.15);color:#6EE7B7}
    .mini-badge.img{background:rgba(249,115,22,0.15);color:#FDBA74}
    .mini-name{flex:1;color:rgba(255,255,255,0.7);font-weight:500}
    .mini-amount{color:rgba(255,255,255,0.9);font-weight:600}

    /* Section titles */
    h2{font-size:clamp(2rem,3.5vw,3rem);font-weight:800;line-height:1.1;margin-bottom:16px}
    .accent{color:var(--accent)}
    .lead{font-size:1.1rem;color:var(--muted);line-height:1.7;max-width:560px}

    /* Pain cards */
    .pain-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:32px}
    .pain-card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:28px 24px}
    .pain-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.06);transition:all 0.3s}
    .pain-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
    .pain-icon.red{background:rgba(239,68,68,0.06);color:var(--red)}
    .pain-icon.orange{background:rgba(249,115,22,0.06);color:var(--accent)}
    .pain-card h3{font-size:16px;font-weight:700;margin-bottom:8px}
    .pain-card p{font-size:14px;color:var(--muted);line-height:1.6}

    /* Flow */
    .flow{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:14px;align-items:start;margin-top:32px}
    .flow-card{background:var(--dark);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:28px 24px;color:#fff}
    .flow-step{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:0.1em;margin-bottom:12px}
    .flow-card h3{font-size:16px;font-weight:700;margin-bottom:8px}
    .flow-card p{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.6}
    .flow-arrow{display:flex;align-items:center;color:var(--accent);font-size:20px;padding-top:40px}

    /* Mock window (product slide) */
    .mock-window{background:var(--dark2);border-radius:16px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.2)}
    .mock-bar{display:flex;gap:6px;padding:10px 14px;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06)}
    .mock-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.1)}
    .mock-body{display:flex;height:340px;overflow:hidden}
    .mock-sidebar{width:48px;background:linear-gradient(180deg,#0D1526,#111B30);border-right:1px solid rgba(255,255,255,0.04);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:10px;flex-shrink:0}
    .mock-logo{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#F97316,#FDBA74);margin-bottom:8px}
    .mock-nav-i{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,0.04)}
    .mock-nav-i.active{background:rgba(249,115,22,0.15);border-left:2px solid var(--accent)}
    .mock-content{flex:1;background:var(--bg);padding:16px;overflow:hidden}
    .mock-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .mock-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);background:rgba(249,115,22,0.08);padding:3px 8px;border-radius:100px}
    .mock-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
    .mock-metric{background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
    .mock-metric-num{font-size:16px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;display:block}
    .mock-metric-lbl{font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;font-weight:600}

    /* Extract rows */
    .ext-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:13px}
    .ext-label{color:rgba(255,255,255,0.4)}
    .ext-value{color:#fff;font-weight:600}

    /* Chat mockup */
    .chat-mock{background:var(--dark2);border-radius:20px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.3);max-width:380px}
    .chat-header{display:flex;align-items:center;gap:10px;padding:14px 18px;background:linear-gradient(135deg,#0F172A,#1E293B)}
    .chat-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;object-position:center 20%;border:2px solid rgba(249,115,22,0.4)}
    .chat-name{font-size:13px;font-weight:700;color:#fff}
    .chat-role{font-size:10px;color:rgba(255,255,255,0.4)}
    .chat-online{width:8px;height:8px;border-radius:50%;background:var(--green);margin-left:auto}
    .chat-body{padding:16px;background:#f8fafc;min-height:260px;display:flex;flex-direction:column;gap:10px}
    .chat-msg{display:flex;gap:8px;align-items:flex-start}
    .chat-msg-av{width:22px;height:22px;border-radius:50%;object-fit:cover;object-position:center 20%;border:1px solid var(--border);flex-shrink:0;margin-top:2px}
    .chat-bubble{background:#fff;border:1px solid var(--border);border-radius:14px 14px 14px 4px;padding:10px 14px;font-size:12px;color:var(--text);line-height:1.5;max-width:260px}
    .chat-bubble strong{color:var(--text)}
    .chat-bubble-user{background:var(--accent);color:#fff;border-radius:14px 14px 4px 14px;padding:10px 14px;font-size:12px;font-weight:500;margin-left:auto}
    .chat-chips{display:flex;flex-wrap:wrap;gap:5px;padding-left:30px}
    .chat-chip{font-size:10px;font-weight:600;color:var(--accent);background:#fff;border:1px solid var(--accent-light);padding:4px 10px;border-radius:100px}
    @keyframes chatIn{0%,8%{opacity:0;transform:translateY(8px)}14%,78%{opacity:1;transform:translateY(0)}86%,100%{opacity:0;transform:translateY(-4px)}}
    .anim-chat{opacity:0;animation:chatIn 12s ease-in-out infinite}

    /* Impact */
    .impact-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:32px}
    .impact-card{text-align:center;padding:32px 20px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:20px}
    .impact-num{font-size:clamp(2.5rem,4vw,3.5rem);font-weight:900;color:#fff;font-family:'Plus Jakarta Sans',sans-serif}
    .impact-unit{font-size:0.5em;color:var(--accent-light);margin-left:2px}
    .impact-lbl{font-size:13px;color:rgba(255,255,255,0.45);margin-top:8px}

    /* Testimonial */
    .testi{display:flex;align-items:center;gap:20px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:24px 28px;margin-top:40px;max-width:700px;margin-left:auto;margin-right:auto}
    .testi-av{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid rgba(249,115,22,0.3);flex-shrink:0}
    .testi-quote{font-size:14px;color:rgba(255,255,255,0.7);line-height:1.6;font-style:italic}
    .testi-name{font-size:12px;color:#fff;font-weight:700;margin-top:8px}
    .testi-role{font-size:12px;color:rgba(255,255,255,0.4)}

    /* Hub integration */
    .hub{display:flex;align-items:center;justify-content:center;gap:40px;margin-top:40px;flex-wrap:wrap}
    .hub-center{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-light));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 8px 32px rgba(249,115,22,0.3)}
    .hub-spoke{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:12px;color:var(--text);font-weight:600}
    .hub-spoke-dot{width:40px;height:40px;border-radius:12px;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
    .hub-spoke-dot svg{width:20px;height:20px;color:var(--muted)}

    /* Diff cards */
    .diff-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:32px}
    .diff-card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:28px 24px}
    .diff-card h3{font-size:15px;font-weight:700;margin-bottom:6px}
    .diff-card p{font-size:13px;color:var(--muted);line-height:1.6}
    .diff-ic{width:44px;height:44px;border-radius:12px;background:rgba(249,115,22,0.06);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:12px}

    /* CTA */
    .cta-box{text-align:center;position:relative;z-index:2}
    .cta-btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;font-size:16px;font-weight:700;padding:16px 40px;border-radius:100px;text-decoration:none;box-shadow:0 8px 32px rgba(249,115,22,0.3);transition:all 0.2s;font-family:'Plus Jakarta Sans',sans-serif}
    .cta-btn:hover{background:var(--accent-hover);transform:translateY(-2px)}
    .cta-trust{display:flex;justify-content:center;gap:24px;margin-top:24px;font-size:13px;color:rgba(255,255,255,0.5);font-weight:500}

    /* Split */
    .split{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}

    /* Animated bars */
    @keyframes barGrow{0%,10%{transform:scaleY(0);opacity:0}20%,80%{transform:scaleY(1);opacity:1}90%,100%{transform:scaleY(0);opacity:0}}
    .anim-bar{transform-origin:bottom;animation:barGrow 8s ease-in-out infinite}
    @keyframes slideUp{0%,10%{opacity:0;transform:translateY(10px)}20%,80%{opacity:1;transform:translateY(0)}90%,100%{opacity:0;transform:translateY(-4px)}}
    .anim-row{opacity:0;animation:slideUp 8s ease-in-out infinite}

    /* Integration animations */
    @keyframes spin-slow{from{transform:translate(-50%,-50%) rotate(0)}to{transform:translate(-50%,-50%) rotate(360deg)}}
    @keyframes int-pulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.05)}}

    @media(max-width:768px){
      .pain-grid,.impact-grid{grid-template-columns:1fr}
      .flow{grid-template-columns:1fr}.flow-arrow{display:none}
      .split{grid-template-columns:1fr}
      .diff-grid{grid-template-columns:1fr}
      .slide{padding:60px 24px 32px}
      .float-cards{display:none}
    }
  </style>
</head>
<body>
  <div class="nav" id="nav">
    <span class="nav-logo">Esphera</span>
    <div class="nav-dots" id="navDots"></div>
    <span class="nav-label" id="slideLabel">1/10</span>
    <button class="nav-btn" id="prevBtn">‹</button>
    <button class="nav-btn" id="nextBtn">›</button>
  </div>
  <div id="deck"></div>

  <script>
    const params=new URLSearchParams(location.search);
    let tipo=params.get('tipo')||'empresa';
    const empresa=params.get('empresa')||'';
    const contacto=params.get('contacto')||'';
    const isG=tipo==='gestoria';
    const chk='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
    const ic={
      doc:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>',
      key:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v4m6.364 1.636l-2.828 2.828M20 12h-4M17.364 17.364l-2.828-2.828M12 20v-4M6.636 17.364l2.828-2.828M4 12h4M6.636 6.636l2.828 2.828"/></svg>',
      alert:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg>',
      users:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>',
      clock:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>',
      brain:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>',

            const y2=50+Math.sin(rad)*28;
            return `<svg style="position:absolute;inset:0;width:100%;height:100%;z-index:1"><line x1="${x1}%" y1="${y1}%" x2="${x2}%" y2="${y2}%" stroke="rgba(249,115,22,0.2)" stroke-width="1" stroke-dasharray="4 4"><animate attributeName="stroke-opacity" values="0.1;0.4;0.1" dur="2s" begin="${i*0.3}s" repeatCount="indefinite"/></line></svg>`;
          }).join('')}
        </div>

        <!-- Google Drive highlight + banks -->
        <div class="reveal d4" style="margin-top:32px">
          <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px 28px;max-width:600px;margin:0 auto 16px;display:flex;align-items:center;gap:16px">
            <div style="width:44px;height:44px;border-radius:12px;background:rgba(16,185,129,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M8.627 3L1 16.094l3.627 6.281L12.254 9.281 8.627 3z" fill="#4285F4"/><path d="M15.373 3H8.627l7.627 13.094h6.373L15.373 3z" fill="#0F9D58"/><path d="M1 16.094l3.627 6.281h17.746l3.627-6.281H1z" fill="#F4B400"/></svg>
            </div>
            <div style="text-align:left">
              <div style="font-size:14px;font-weight:700;color:#fff">Google Drive integrado</div>
              <div style="font-size:12px;color:rgba(255,255,255,0.45);margin-top:2px">Conecta tu Drive y Esphera sincroniza tus facturas automáticamente. Sin subir archivos manualmente.</div>
            </div>
            <span style="font-size:11px;font-weight:600;color:var(--green);background:rgba(16,185,129,0.1);padding:4px 10px;border-radius:100px;white-space:nowrap;flex-shrink:0">Conectado</span>
          </div>
          <div style="display:flex;justify-content:center;gap:12px">
            <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:10px 20px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.5)">Norma 43</div>
            <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:10px 20px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.5)">CSV / MT940</div>
          </div>
        </div>
      </div>
    </section>

    <!-- 8 POR QUÉ ESPHERA -->
    <section class="slide" data-slide="8">
      <div class="slide-inner">
        <span class="tag tag-light reveal">Por qué Esphera</span>
        <h2 class="reveal d1">No es otro software más</h2>
        <div class="diff-grid">${c.diffs.map((d,i)=>`<div class="diff-card reveal d${i+1}"><div class="diff-ic">${d.icon}</div><h3>${d.t}</h3><p>${d.d}</p></div>`).join('')}</div>
      </div>
    </section>

    <!-- 9 CTA -->
    <section class="slide slide-dark" data-slide="9">
      <div class="slide-bg"><img src="Gemini_Generated_Image_1oi7041oi7041oi7 (1).png" alt=""></div>
      <div class="slide-overlay"></div>
      <div class="slide-inner">
        <div class="cta-box">
          <span class="tag tag-dark reveal">Siguiente paso</span>
          <h2 class="reveal d1" style="font-size:clamp(2.5rem,5vw,4rem)">${c.ctaT}</h2>
          <p class="reveal d2" style="font-size:17px;color:rgba(255,255,255,0.55);max-width:500px;margin:0 auto 32px;line-height:1.65">${c.ctaL}</p>
          <a href="http://localhost:3000/#demo" class="cta-btn reveal d3" target="_blank">Solicitar demo →</a>
          <div class="cta-trust reveal d4"><span>${chk} Sin compromiso</span><span>${chk} Sin instalación</span><span>${chk} Con tus facturas reales</span></div>
        </div>
      </div>
    </section>`;

    // Customize product iframe
    document.getElementById('product-iframe').addEventListener('load', function(){
      try {
        var w = this.contentWindow, d = w.document;
        w.dismissOnboarding();
        if (empresa) {
          d.querySelectorAll('p').forEach(function(el){ if(el.textContent.includes('Gestoria Mendoza')) el.textContent = empresa; });
          d.querySelectorAll('p').forEach(function(el){ if(el.textContent.includes('B48901234')) el.textContent = 'B48901234 — ' + (isG ? 'Asesoría fiscal y contable' : 'Departamento financiero'); });
        }
        var name = contacto || 'Juan';
        d.querySelectorAll('h1').forEach(function(el){ if(el.textContent.includes('Hola, Juan')) el.textContent = 'Hola, ' + name + ' 👋'; });
        d.querySelectorAll('p').forEach(function(el){ if(el.innerHTML && el.innerHTML.includes('Hola, Juan')) el.innerHTML = el.innerHTML.replace(/Hola, Juan/g, 'Hola, ' + name); });
      } catch(e) { console.log('iframe:', e); }
    });

    // Reveal
    const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')})},{threshold:0.1});
    document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));

    // Nav
    const slides=document.querySelectorAll('.slide'),total=slides.length;
    const navDots=document.getElementById('navDots'),sLabel=document.getElementById('slideLabel');
    let cur=0;
    for(let i=0;i<total;i++){const d=document.createElement('div');d.className='nav-dot'+(i===0?' active':'');d.onclick=()=>slides[i].scrollIntoView({behavior:'smooth'});navDots.appendChild(d)}
    sLabel.textContent=`1/${total}`;
    function upNav(){
      const sp=scrollY+innerHeight/2;let a=0;
      slides.forEach((s,i)=>{if(sp>=s.offsetTop)a=i});
      if(a!==cur){cur=a;document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('active',i===a));sLabel.textContent=`${a+1}/${total}`}
      const dark=Array.from(document.querySelectorAll('.slide-dark')).some(s=>sp>=s.offsetTop&&sp<s.offsetTop+s.offsetHeight);
      document.getElementById('nav').classList.toggle('on-dark',dark);
    }
    addEventListener('scroll',upNav);upNav();
    document.getElementById('prevBtn').onclick=()=>{if(cur>0)slides[cur-1].scrollIntoView({behavior:'smooth'})};
    document.getElementById('nextBtn').onclick=()=>{if(cur<total-1)slides[cur+1].scrollIntoView({behavior:'smooth'})};
    document.addEventListener('keydown',e=>{
      if(['ArrowDown','ArrowRight',' '].includes(e.key)){e.preventDefault();if(cur<total-1)slides[cur+1].scrollIntoView({behavior:'smooth'})}
      if(['ArrowUp','ArrowLeft'].includes(e.key)){e.preventDefault();if(cur>0)slides[cur-1].scrollIntoView({behavior:'smooth'})}
    });

    // Tracking
    (function(){
      const deckId=params.get('empresa')||'anonymous',trackKey='esphera_track_'+encodeURIComponent(deckId);
      let data=JSON.parse(localStorage.getItem(trackKey)||'null')||{empresa:deckId,tipo,views:[],slideTime:{},firstVisit:new Date().toISOString(),lastVisit:null,maxSlide:0};
      data.lastVisit=new Date().toISOString();data.views.push({ts:new Date().toISOString(),slide:0});
      let lastSlide=0,lastTime=Date.now();
      const tObs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){
        const idx=parseInt(e.target.dataset.slide),now=Date.now();
        if(!data.slideTime[lastSlide])data.slideTime[lastSlide]=0;
        data.slideTime[lastSlide]+=(now-lastTime)/1000;lastSlide=idx;lastTime=now;
        data.views.push({ts:new Date().toISOString(),slide:idx});
        if(idx>data.maxSlide)data.maxSlide=idx;
        localStorage.setItem(trackKey,JSON.stringify(data));
      }})},{threshold:0.5});
      document.querySelectorAll('.slide').forEach(s=>tObs.observe(s));
      window.addEventListener('beforeunload',()=>{
        if(!data.slideTime[lastSlide])data.slideTime[lastSlide]=0;
        data.slideTime[lastSlide]+=(Date.now()-lastTime)/1000;
        localStorage.setItem(trackKey,JSON.stringify(data));
        let idx=JSON.parse(localStorage.getItem('esphera_track_index')||'[]');
        if(!idx.includes(trackKey))idx.push(trackKey);
        localStorage.setItem('esphera_track_index',JSON.stringify(idx));
      });
    })();
  </script>
</body>
</html>
