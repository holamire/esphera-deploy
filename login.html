    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0C1222;
            --accent: #F97316;
            --accent-hover: #EA580C;
            --accent-light: #FDBA74;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        html { -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        a { color: inherit; text-decoration: none; }

        /* Background sphere */
        .login-sphere {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            opacity: 0.03;
            pointer-events: none;
        }

        /* Ambient glow */
        .login-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            pointer-events: none;
        }
        .login-glow-1 {
            top: -15%;
            right: -10%;
            background: radial-gradient(circle, rgba(249,115,22,0.08) 0%, transparent 60%);
        }
        .login-glow-2 {
            bottom: -15%;
            left: -10%;
            background: radial-gradient(circle, rgba(249,115,22,0.05) 0%, transparent 60%);
        }

        /* Card */
        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            margin: 24px;
        }

        /* Logo */
        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }
        .login-logo svg {
            height: 36px;
        }

        /* Heading */
        .login-heading {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-heading h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }
        .login-heading p {
            font-size: 14px;
            color: rgba(255,255,255,0.45);
        }

        /* Form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .login-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .login-field label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.5);
        }
        .login-field input {
            width: 100%;
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            outline: none;
            transition: var(--transition);
        }
        .login-field input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .login-field input:focus {
            border-color: var(--accent-light);
            background: rgba(255,255,255,0.1);
        }

        /* Remember + forgot */
        .login-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .login-remember {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: rgba(255,255,255,0.45);
            cursor: pointer;
        }
        .login-remember input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }
        .login-forgot {
            font-size: 13px;
            color: var(--accent-light);
            transition: var(--transition);
        }
        .login-forgot:hover {
            color: var(--accent);
        }

        /* Button */
        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--accent);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
        }
        .login-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 32px rgba(249,115,22,0.25);
        }

        /* Divider */
        .login-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 8px 0;
        }
        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }
        .login-divider span {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* SSO button */
        .login-sso {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 13px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: var(--radius-sm);
            background: transparent;
            color: rgba(255,255,255,0.7);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }
        .login-sso:hover {
            border-color: rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.04);
            color: white;
        }
        .login-sso svg {
            width: 18px;
            height: 18px;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 14px;
            color: rgba(255,255,255,0.35);
        }
        .login-footer a {
            color: var(--accent-light);
            font-weight: 500;
            transition: var(--transition);
        }
        .login-footer a:hover {
            color: var(--accent);
        }

        /* Back link */
        .login-back {
            position: absolute;
            top: 32px;
            left: 32px;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            transition: var(--transition);
        }
        .login-back:hover {
            color: white;
        }
        .login-back svg {
            width: 16px;
            height: 16px;
        }

        /* Top accent line */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 24px;
            right: 24px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent-light), transparent);
            border-radius: 0 0 2px 2px;
            opacity: 0.6;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
                margin: 16px;
                border-radius: 20px;
            }
            .login-back {
                top: 20px;
                left: 20px;
            }
        }
    </style>
</head>

        <div class="login-heading">
            <h1>Bienvenido de vuelta</h1>
            <p>Accede a tu cuenta para continuar</p>
        </div>

        <form class="login-form" id="loginForm">
            <div class="login-field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="tu@empresa.com" required>
            </div>
            <div class="login-field">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
            </div>
            <div class="login-options">
                <label class="login-remember">
                    <input type="checkbox" name="remember"> Recordarme
                </label>
                <a href="#" class="login-forgot">¿Olvidaste tu contraseña?</a>
            </div>
            <button type="submit" class="login-btn">Acceder</button>
        </form>

        <div class="login-divider"><span>o</span></div>

        <button class="login-sso">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Acceder con SSO corporativo
        </button>

        <p class="login-footer">
            ¿Aún no eres cliente? <a href="index.html#demo">Solicita una demo</a>
        </p>
    </div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    // Simulate login — redirect to product
    const btn = this.querySelector('.login-btn');
    btn.textContent = 'Accediendo...';
    btn.style.opacity = '0.7';
    setTimeout(() => {
        window.location.href = 'http://localhost:8080';
    }, 800);
});
</script>
